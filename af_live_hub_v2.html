function RefreshTab({data,onUpdate}){

  const callClaude=async(prompt)=>{
    setLoading(true);setResponse("");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`You are an AppsFlyer commercial intelligence assistant. User request: "${prompt}". Respond with: 1) Brief summary of what should be updated (2-3 sentences), 2) Specific data points to apply (bullet list), 3) Note on how to apply updates. Keep under 300 words.`}]})});

      onUpdate(prev=>({...prev,lastRefreshed:new Date().toLocaleString(),refreshLog:[{timestamp:new Date().toLocaleString(),query:prompt,summary:(json.content?.[0]?.text||"").split("\n")[0]},...(prev.refreshLog||[]).slice(0,9)]}));
