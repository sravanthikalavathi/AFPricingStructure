function RefreshTab({data,onUpdate}) {
  const [query,setQuery] = useState("");
  const [loading,setLoading] = useState(false);
  const [response,setResponse] = useState("");
  const QUICK = ["Update competitor section with latest Adjust and Branch news 2025","Add new AppsFlyer product launches from product news page","Update India market stats and mobile ad spend data","Refresh Protect360 fraud statistics with latest India data","Update Audiences partner count and new integrations","Add latest AppsFlyer Performance Index 2025 findings"];
  const callClaude = async (prompt) => {
    setLoading(true); setResponse("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`You are an AppsFlyer commercial intelligence assistant. User request: "${prompt}". Respond with: 1) Brief summary of what should be updated (2-3 sentences), 2) Specific data points to apply (bullet list), 3) Note on how to apply updates. Keep under 300 words. Be specific with numbers and dates.`}]})});
      const json = await res.json();
      setResponse(json.content?.[0]?.text||"No response.");
      onUpdate(prev=>({...prev,lastRefreshed:new Date().toLocaleString(),refreshLog:[{timestamp:new Date().toLocaleString(),query:prompt,summary:(json.content?.[0]?.text||"").split("\n")[0]},...(prev.refreshLog||[]).slice(0,9)]}));
    } catch { setResponse("Error calling refresh API. Please try again."); }
    setLoading(false);
  };
  return (
    <div>
      <Hero tag="Data Refresh Center" title="Keep Your Hub" hi="Always Current"
        sub="Auto-refresh sections with the latest market data, or type a specific request to update any part of your deck."/>
      <Card style={{borderTop:`4px solid ${B.orange}`,marginBottom:16}}>
        <div style={{fontWeight:800,fontSize:13,marginBottom:4}}>💬 Custom Refresh Request</div>
        <div style={{fontSize:12,color:B.muted,marginBottom:12}}>Type exactly what you want updated — e.g. "Update Adjust battle card with 2025 product updates"</div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&query.trim()&&callClaude(query)}
            placeholder='e.g. "Refresh competitive data with latest 2025 updates"'
            style={{flex:1,border:`1.5px solid ${B.g3}`,borderRadius:7,padding:"9px 12px",fontSize:12.5,outline:"none"}}/>
          <button onClick={()=>query.trim()&&callClaude(query)} disabled={loading||!query.trim()}
            style={{background:loading||!query.trim()?B.muted:B.orange,border:"none",color:"white",borderRadius:7,padding:"9px 18px",cursor:loading||!query.trim()?"not-allowed":"pointer",fontSize:12,fontWeight:700}}>
            {loading?"Fetching...":"Get Update →"}
          </button>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:response?12:0}}>
          {QUICK.map((p,i)=><button key={i} onClick={()=>setQuery(p)} style={{background:query===p?B.orangeL:B.g2,border:`1px solid ${query===p?B.orange:B.g3}`,borderRadius:15,padding:"4px 10px",cursor:"pointer",fontSize:10.5,fontWeight:600,color:query===p?B.orange:B.muted}}>{p}</button>)}
        </div>
        {response&&<div style={{background:B.g1,border:`1px solid ${B.g3}`,borderRadius:9,padding:"14px 16px",marginTop:12}}>
          <div style={{fontSize:11,fontWeight:700,color:B.green,marginBottom:8}}>✅ Refresh Intelligence — Apply these updates to your hub:</div>

          <div style={{marginTop:10,padding:"8px 10px",background:B.blueL,borderRadius:7,fontSize:11,color:B.blue}}><strong>How to apply:</strong> Click the edit ✏️ icon on this artifact → find the relevant section in initialData → update with the specifics above → save.</div>
        </div>}
      </Card>
      {data.lastRefreshed&&<Co type="green" title={`✅ Last refreshed: ${data.lastRefreshed}`}>All sections reflect the latest available data from this refresh session.</Co>}
      {data.refreshLog&&data.refreshLog.length>0&&(
        <Card>
          <div style={{fontWeight:800,fontSize:13,marginBottom:10}}>📜 Refresh History</div>
          {data.refreshLog.map((entry,i)=>(
            <div key={i} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:`1px solid ${B.g3}`,alignItems:"flex-start"}}>
              <div style={{background:B.greenL,borderRadius:6,padding:"3px 7px",fontSize:10,fontWeight:700,color:B.green,whiteSpace:"nowrap"}}>{entry.timestamp}</div>
              <div><div style={{fontSize:11.5,fontWeight:600,marginBottom:2}}>{entry.query}</div><div style={{fontSize:11,color:B.muted}}>{entry.summary}</div></div>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}
